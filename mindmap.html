const MOD_KEYS = Object.keys(DATA);
const CX=510, CY=345, MOD_R=155, OBJ_R=285;

function getModPos(i){
  const a=(i/MOD_KEYS.length)*2*Math.PI-Math.PI/2;
  return{x:CX+MOD_R*Math.cos(a),y:CY+MOD_R*Math.sin(a),angle:a};
}
function getObjPos(mk,ma){
  const obs=DATA[mk].objects;
  const sp=Math.PI*0.65;
  return obs.map((o,i)=>{
    const a=ma-sp/2+(i/Math.max(obs.length-1,1))*sp;
    return{...o,x:CX+OBJ_R*Math.cos(a),y:CY+OBJ_R*Math.sin(a)};
  });
}

function MindMap({sm,setSm,so,setSo}){
  const mpos=MOD_KEYS.map((k,i)=>({key:k,...getModPos(i)}));
  const opos=sm?getObjPos(sm,mpos.find(m=>m.key===sm).angle):[];
  return(
    <svg viewBox="0 0 1020 690" style={{width:"100%",height:"100%"}}>
      <defs>
        <radialGradient id="cg" cx="50%" cy="50%">
          <stop offset="0%" stopColor={P.bgCard}/>
          <stop offset="100%" stopColor={P.bgMid}/>
        </radialGradient>
        <filter id="shadow">
          <feDropShadow dx="0" dy="1" stdDeviation="2" floodColor={P.border} floodOpacity="0.4"/>
        </filter>
      </defs>
      <rect x={0} y={0} width={1020} height={690} fill="transparent"
        onClick={()=>{setSm(null);setSo(null);}}/>
      <circle cx={CX} cy={CY} r={MOD_R} fill="none" stroke={P.border2} strokeWidth={1} strokeDasharray="3,8"/>
      <circle cx={CX} cy={CY} r={OBJ_R} fill="none" stroke={P.border2} strokeWidth={1} strokeDasharray="2,10"
        opacity={sm?0.7:0.3}/>
      {mpos.map(mp=>(
        <line key={`l-${mp.key}`} x1={CX} y1={CY} x2={mp.x} y2={mp.y}
          stroke={P.accentMd} strokeWidth={sm===mp.key?2.5:1.5}
          opacity={sm&&sm!==mp.key?0.1:sm===mp.key?1:0.4}/>
      ))}
      {opos.map(op=>{
        const mp=mpos.find(m=>m.key===sm);
        return(
          <line key={`ol-${op.id}`} x1={mp.x} y1={mp.y} x2={op.x} y2={op.y}
            stroke={P.accentMd} strokeWidth={1.5}
            opacity={so===op.id?0.9:0.5}
            strokeDasharray={so===op.id?"none":"4,3"}/>
        );
      })}
      {mpos.map(mp=>{
        const mod=DATA[mp.key];
        const isA=sm===mp.key;
        const isDim=sm&&!isA;
        return(
          <g key={mp.key} style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation();setSm(isA?null:mp.key);setSo(null);}}>
            {isA&&<circle cx={mp.x} cy={mp.y} r={50} fill="none" stroke={P.accent} strokeWidth={2} opacity={0.4}/>}
            <circle cx={mp.x} cy={mp.y} r={43}
              fill={isA?P.accent:P.bgCard}
              stroke={P.accent} strokeWidth={2.5}
              filter="url(#shadow)"
              opacity={isDim?0.25:1}/>
            <text x={mp.x} y={mp.y-5} textAnchor="middle" fontSize="13" fontWeight="800" letterSpacing="0.5"
              fill={isA?P.bgCard:P.accent} opacity={isDim?0.25:1}>{mod.label}</text>
            <text x={mp.x} y={mp.y+11} textAnchor="middle" fontSize="7.5" letterSpacing="0.2"
              fill={isA?P.bgMid:P.textMut} opacity={isDim?0.25:1}>{mod.objects.length} objects</text>
          </g>
        );
      })}
      {opos.map(op=>{
        const isSel=so===op.id;
        const ws=op.label.split(" ");
        const l1=ws.slice(0,2).join(" ");
        const l2=ws.slice(2).join(" ");
        const h=l2?46:36;
        return(
          <g key={op.id} style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation();setSo(isSel?null:op.id);}}>
            <rect x={op.x-63} y={op.y-h/2} width={126} height={h} rx={7}
              fill={isSel?P.accent:P.bgCard}
              stroke={P.accent} strokeWidth={isSel?0:2}
              filter="url(#shadow)"/>
            <text x={op.x} y={op.y-(l2?5:1)} textAnchor="middle" fontSize="9" fontWeight="700"
              fill={isSel?P.bgCard:P.textPri}>{l1}</text>
            {l2&&<text x={op.x} y={op.y+9} textAnchor="middle" fontSize="8"
              fill={isSel?P.accentLt:P.textSec}>{l2}</text>}
          </g>
        );
      })}
      <circle cx={CX} cy={CY} r={52} fill="url(#cg)" stroke={P.accent} strokeWidth={2.5} filter="url(#shadow)"/>
      <text x={CX} y={CY-8} textAnchor="middle" fontSize="13" fontWeight="800" letterSpacing="2" fill={P.accent}>SAP</text>
      <text x={CX} y={CY+7} textAnchor="middle" fontSize="9" letterSpacing="0.5" fill={P.textSec}>S/4HANA</text>
      <text x={CX} y={CY+20} textAnchor="middle" fontSize="7" letterSpacing="0.5" fill={P.textMut}>On-Premise</text>
      {!sm&&<text x={CX} y={680} textAnchor="middle" fontSize="10" fill={P.textMut} letterSpacing="0.3">
        Select a module node to expand — select an object to view its fields
      </text>}
    </svg>
  );
}

function Reference(){
  const [open,setOpen]=useState({});
  const [openObj,setOpenObj]=useState({});
  const [q,setQ]=useState("");
  const sq=q.toLowerCase().trim();
  const filtered=useMemo(()=>{
    if(!sq)return DATA;
    return Object.entries(DATA).reduce((acc,[k,mod])=>{
      const objs=mod.objects.filter(o=>
        o.label.toLowerCase().includes(sq)||
        o.table.toLowerCase().includes(sq)||
        o.attrs.some(a=>a.toLowerCase().includes(sq))
      );
      if(objs.length||mod.label.toLowerCase().includes(sq)||mod.full.toLowerCase().includes(sq)){
        acc[k]={...mod,objects:objs.length?objs:mod.objects};
      }
      return acc;
    },{});
  },[sq]);

  const totalObjs=Object.values(DATA).reduce((s,m)=>s+m.objects.length,0);
  const totalFields=Object.values(DATA).reduce((s,m)=>s+m.objects.reduce((ss,o)=>ss+o.attrs.length,0),0);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"0.65rem 1rem",borderBottom:`2px solid ${P.border}`,background:P.bgDeep,
        display:"flex",gap:"0.75rem",alignItems:"center"}}>
        <input value={q} onChange={e=>setQ(e.target.value)}
          placeholder="Search object types, table names, field names (e.g. MATNR, ACDOCA, Cost Center)..."
          style={{flex:1,background:P.bgCard,border:`2px solid ${P.border}`,borderRadius:"5px",
            padding:"0.42rem 0.75rem",color:P.textPri,fontSize:"0.78rem",outline:"none"}}/>
        <span style={{color:P.textMut,fontSize:"0.65rem",whiteSpace:"nowrap"}}>
          {totalObjs} objects · {totalFields} fields
        </span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0.65rem"}}>
        {Object.entries(filtered).map(([key,mod])=>(
          <div key={key} style={{marginBottom:"0.55rem",border:`2px solid ${P.border}`,borderRadius:"7px",overflow:"hidden"}}>
            <div onClick={()=>setOpen(p=>({...p,[key]:!p[key]}))}
              style={{padding:"0.6rem 0.85rem",background:p=>p?P.accentLt:P.bgMid,cursor:"pointer",
                display:"flex",alignItems:"center",gap:"0.7rem",userSelect:"none",
                background:open[key]?P.accentLt:P.bgMid,
                borderBottom:open[key]?`2px solid ${P.border}`:"none"}}>
              <span style={{color:P.accent,fontWeight:800,fontSize:"0.82rem",minWidth:"46px",letterSpacing:"0.05em"}}>{mod.label}</span>
              <span style={{color:P.textSec,fontSize:"0.73rem",flex:1,fontWeight:600}}>{mod.full}</span>
              <span style={{color:P.textMut,fontSize:"0.65rem"}}>{mod.objects.length} objects</span>
              <span style={{color:P.accent,fontSize:"0.72rem",marginLeft:"0.4rem",fontWeight:700}}>{open[key]?"▲":"▼"}</span>
            </div>
            {open[key]&&(
              <div style={{padding:"0.4rem 0.5rem",background:P.bg}}>
                {mod.objects.map(obj=>{
                  const ok=`${key}-${obj.id}`;
                  return(
                    <div key={obj.id} style={{marginBottom:"0.3rem",border:`1px solid ${P.border}`,borderRadius:"5px",overflow:"hidden"}}>
                      <div onClick={()=>setOpenObj(p=>({...p,[ok]:!p[ok]}))}
                        style={{padding:"0.4rem 0.7rem",background:openObj[ok]?P.accentLt:P.bgCard,
                          cursor:"pointer",display:"flex",alignItems:"center",userSelect:"none",
                          borderLeft:`3px solid ${P.accentMd}`}}>
                        <div style={{flex:1}}>
                          <span style={{color:P.textPri,fontSize:"0.76rem",fontWeight:700}}>{obj.label}</span>
                          <span style={{color:P.textMut,fontSize:"0.62rem",marginLeft:"0.5rem",
                            fontFamily:"Courier New,monospace"}}>{obj.table}</span>
                        </div>
                        <span style={{color:P.textMut,fontSize:"0.62rem",marginRight:"0.4rem"}}>{obj.attrs.length} fields</span>
                        <span style={{color:P.accent,fontSize:"0.65rem",fontWeight:700}}>{openObj[ok]?"▲":"▼"}</span>
                      </div>
                      {openObj[ok]&&(
                        <div style={{padding:"0.4rem 0.75rem 0.5rem",background:P.bgCard}}>
                          {obj.attrs.map((a,i)=>{
                            const sp=a.indexOf("  ");
                            const field=sp>-1?a.slice(0,sp):a;
                            const desc=sp>-1?a.slice(sp).trim():"";
                            const hi=sq&&a.toLowerCase().includes(sq);
                            return(
                              <div key={i} style={{display:"flex",gap:"0.5rem",padding:"0.23rem 0",
                                borderBottom:`1px solid ${P.border2}`,
                                background:hi?P.accentLt:"transparent",
                                paddingLeft:hi?"0.3rem":"0"}}>
                                <code style={{color:hi?P.accent:P.accentMd,fontSize:"0.67rem",
                                  minWidth:"58px",flexShrink:0,fontWeight:hi?800:600}}>{field}</code>
                                <span style={{color:hi?P.textPri:P.textSec,fontSize:"0.67rem",lineHeight:1.4}}>{desc}</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
        {Object.keys(filtered).length===0&&(
          <div style={{textAlign:"center",color:P.textMut,padding:"3rem",fontSize:"0.8rem"}}>
            No results found for "{q}"
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [mode,setMode]=useState("map");
  const [sm,setSm]=useState(null);
  const [so,setSo]=useState(null);
  const totalObjs=Object.values(DATA).reduce((s,m)=>s+m.objects.length,0);
  const totalFields=Object.values(DATA).reduce((s,m)=>s+m.objects.reduce((ss,o)=>ss+o.attrs.length,0),0);
  return(
    <div style={{background:P.bg,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0.45rem 1.1rem",borderBottom:`2px solid ${P.border}`,display:"flex",
        alignItems:"center",justifyContent:"space-between",flexShrink:0,background:P.bgDeep}}>
        <div>
          <div style={{fontWeight:800,fontSize:"0.9rem",color:P.textPri,letterSpacing:"0.03em"}}>
            SAP S/4HANA Object Reference
          </div>
          <div style={{color:P.textSec,fontSize:"0.62rem",letterSpacing:"0.04em",marginTop:"0.1rem"}}>
            ENPPI &nbsp;·&nbsp; {MOD_KEYS.length} Modules &nbsp;·&nbsp; {totalObjs} Object Types &nbsp;·&nbsp; {totalFields} Fields
          </div>
        </div>
        <div style={{display:"flex",gap:"0.35rem"}}>
          {[["map","Mind Map"],["ref","Reference"]].map(([m,lbl])=>(
            <button key={m} onClick={()=>setMode(m)} style={{
              padding:"0.28rem 0.8rem",borderRadius:"4px",fontSize:"0.72rem",fontWeight:700,
              letterSpacing:"0.04em",
              background:mode===m?P.accent:P.bgCard,
              color:mode===m?P.bgCard:P.accent,
              border:`2px solid ${mode===m?P.accent:P.border}`,
            }}>{lbl}</button>
          ))}
        </div>
      </div>
      {mode==="map"?(
        <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
          <div style={{flex:"0 0 65%",overflow:"hidden"}}>
            <MindMap sm={sm} setSm={setSm} so={so} setSo={setSo}/>
          </div>
          <div style={{flex:"0 0 35%",borderLeft:`2px solid ${P.border}`,overflow:"hidden"}}>
            <Panel sm={sm} so={so}/>
          </div>
        </div>
      ):(
        <div style={{flex:1,overflow:"hidden",minHeight:0}}><Reference/></div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
